<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/bootstrap :: bootstrapCss()}"></th:block>
    <title>Food </title>
</head>

<body style="background-color:  #516b51;">
    <div th:replace="~{ fragments/navbar :: navbar }"></div>
    <div class="container">
        <h1>Food</h1>
        <h2 th:unless="${edit}" th:text="|Aggiungi un nuovo cibo|"></h2>
        <h2 th:if="${edit}" th:text="|Modifica di ${cibo.name}|"></h2>
        <form id="cibo-form" method="post" th:action="${edit} ?@{|/cibi/edit/${cibo.id}|} :@{/cibi/create}"
            th:object="${cibo}" class="border border-1 p-2 rounded-1">

            <label for="name" class="form-label">Nome</label>
            <input type="text" name="name" id="name" th:field="*{name}" class="form-control">
            <label for="descrizione" class="form-label">Descrizione</label>
            <textarea name="descrizione" id="descrizione" th:field="*{descrizione}" class="form-control"></textarea>
            <label for="prezzo" class="form-label">Prezzo</label>
            <input type="number" name="prezzo" id="prezzo" th:field="*{prezzo}" class="form-control">
            <div class="container-fluid d-flex">
                <div class="row w-100">
                    <div id="ingredients-checkbox" class="form-check col-6">
                        <h5>Seleziona gli Ingredienti</h5>
                        <div th:each="ingrediente : ${ingredienti}">
                            <label for="|ingrediente-${ingrediente.id}|" th:text="${ingrediente.name}"
                                class="form-check-label"></label>
                            <input type="checkbox" id="|ingrediente-${ingrediente.id}|" th:value="${ingrediente.id}"
                                th:field="${cibo.ingredienti}" class="form-check-input">
                        </div>
                    </div>
                    <div id="categorie-checkbox" class="form-check col-6">
                        <h5>Seleziona le categorie</h5>
                        <div th:each="categoria : ${categorie}">
                            <label for="|categoria-${.id}|" th:text="${categoria.name}"
                                class="form-check-label"></label>
                            <input type="checkbox" id="|categoria-${.id}|" th:value="${categoria.id}"
                                th:field="${cibo.categorie}" class="form-check-input">
                        </div>
                    </div>
                </div>
            </div>
            <div class="container-fluid w-100 mt-2">
                <input class="btn btn-primary" type="submit" value="Submit">
                <a th:href="${edit} ?@{|/cibi/edit/{id}(id=${cibo.getId()})|} :@{/cibi/create}"
                    class="btn btn-danger ms-auto me-1"> Reset dei valori</a>
            </div>
        </form>
    </div>
    <th:block th:replace="~{fragments/bootstrap :: bootstrapJs()}"></th:block>
</body>

</html>
