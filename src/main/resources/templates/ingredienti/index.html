<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredienti Index</title>
</head>

<body>
    <h1>Index delle ingredienti</h1>
    <h2 th:unless="${ingredienti.size() > 0}" th:text="|Non ci sono ingredienti nel menù!|"></h2>
    <table th:if="${ingredienti.size() > 0}">
        <thead>
            <tr>
                <th>Id</th>
                <th>Nome</th>
                <th>Descrizione</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ingrediente : ${ingredienti}" th:object="${ingrediente}">
                <td th:text="*{id}"></td>
                <td th:text="*{name}"></td>
                <td th:text="*{descrizione}"></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
