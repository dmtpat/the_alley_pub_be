<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/bootstrap :: bootstrapCss()}"></th:block>
    <title>Ingredienti Show</title>
</head>

<body style="background-color:  #516b51;">
    <div th:replace="~{ fragments/navbar :: navbar }"></div>
    <div class="container">
        <h1>Show dell'ingrediente</h1>
        <h2 th:if="${ingrediente == null}" th:text="|L'ingrediente con id ${id} non è presente nel menù!|"></h2>
        <div th:if="${ingrediente != null}" class="container-fluid">
            <div class="row">
                <div class="col-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${ingrediente.name}"></h5>
                            <p class="card-text" th:text="${ingrediente.descrizione}" />
                            <a th:href="|/ingredienti|" class="btn btn-success">Lista ingredienti</a>
                            <a sec:authorize="hasAuthority('ADMIN')" class="btn btn-warning"
                                th:href="|/ingredienti/edit/*{id}|">✏</a>
                            <th:block sec:authorize="hasAuthority('ADMIN')"
                                th:replace="~{fragments/deleteModal:: deleteModal(*{name}, 'ingredienti')}">
                            </th:block>
                        </div>
                    </div>
                </div>
                <div class="col-8">
                    <h3>Cibi che contengono [[${ingrediente.name}]]</h3>
                    <table class="table table-success table-hover">
                        <thead>
                            <tr>
                                <th>Id</th>
                                <th>Nome</th>
                                <th>Descrizione</th>
                                <th>Dettagli</th>
                                <th sec:authorize="hasAuthority('ADMIN')">Modifica</th>
                                <th sec:authorize="hasAuthority('ADMIN')">Elimina</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cibo : ${ingrediente.cibi}" th:object="${cibo}">
                                <td th:text="*{id}"></td>
                                <td th:text="*{name}"></td>
                                <td th:text="*{descrizione}"></td>
                                <td><a class="btn btn-success px-3" th:href="|cibi/*{id}|"> + </a></td>
                                <td sec:authorize="hasAuthority('ADMIN')"><a class="btn btn-warning"
                                        th:href="|cibi/edit/*{id}|">✏</a>
                                </td>
                                <td sec:authorize="hasAuthority('ADMIN')">
                                    <th:block th:replace="~{fragments/deleteModal:: deleteModal(*{name}, 'cibi')}">
                                    </th:block>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
    <th:block th:replace="~{fragments/bootstrap :: bootstrapJs()}"></th:block>
</body>

</html>
