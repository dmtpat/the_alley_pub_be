<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments/bootstrap :: bootstrapCss()}"></th:block>
    <title>Ingredienti</title>
</head>

<body>
    <div th:replace="~{ fragments/navbar :: navbar }"></div>
    <h1>Ingrediente</h1>
    <h2 th:if="${ingrediente == null}" th:text="|L'ingrediente con id ${id} non è presente nel menù!|"></h2>
    <h2 th:if="${edit}" th:text="|Modifica di ${ingrediente.name}|"></h2>
    <form id="ingrediente-form" method="post"
        th:action="${edit} ?@{|/ingredienti/edit/${ingrediente.id}|} :@{/ingredienti/create}"
        th:object="${ingrediente}">

        <label for="name">Nome</label>
        <input type="text" name="name" id="name" th:field="*{name}">
        <label for="descrizione">Descrizione</label>
        <textarea name="descrizione" id="descrizione" th:field="*{descrizione}"></textarea>
        <div>
            <input type="submit" value="Submit">
            <a th:href="${edit} ?@{|/ingredienti/edit/{id}(id=${ingrediente.getId()})|} :@{/ingredienti/create}"> Reset
                dei valori</a>
        </div>
    </form>
    <th:block th:replace="~{fragments/bootstrap :: bootstrapJs()}"></th:block>
</body>

</html>
